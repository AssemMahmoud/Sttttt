<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توليد QR الطلاب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family:'Cairo',sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin:0;
    padding:0;
  }
  .container {
    padding:20px;
    width:100%;
    max-width:480px;
    margin:auto;
    background: rgba(255,255,255,0.95);
    border-radius:20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }
  h2 {
    text-align:center;
    color:#2575fc;
    font-weight:700;
    margin-bottom:15px;
  }
  input, select {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:15px;
  }
  button {
    width:100%;
    background: linear-gradient(90deg, #38ef7d, #11998e);
    color:white;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    margin-top:12px;
    transition: all 0.3s ease;
  }
  button:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }
  #qrcode {
    margin-top:20px;
    text-align:center;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
</head>
<body>
<div class="container">
  <h2>توليد QR الحضور</h2>

  <input type="text" id="name" placeholder="الاسم">
  <input type="text" id="seat" placeholder="رقم الجلوس">
  <input type="text" id="program" placeholder="البرنامج">

  <label>اليوم:</label>
  <select id="day">
    <option value="الخميس">الخميس</option>
    <option value="الأربعاء">الأربعاء</option>
  </select>

  <label>الوقت:</label>
  <select id="time">
    <option value="9 ص">9 ص</option>
    <option value="10:30 ص">10:30 ص</option>
    <option value="12:10 م">12:10 م</option>
    <option value="1:45 م">1:45 م</option>
    <option value="3:20 م">3:20 م</option>
  </select>

  <button onclick="generateQR()">توليد QR</button>

  <div id="qrcode">
    <canvas id="qrCanvas"></canvas>
  </div>

  <script>
    function generateQR(){
      const name = document.getElementById('name').value.trim();
      const seat = document.getElementById('seat').value.trim();
      const program = document.getElementById('program').value.trim();
      const day = document.getElementById('day').value;
      const time = document.getElementById('time').value;

      if(!name || !seat || !program){
        alert('من فضلك اكمل كل البيانات');
        return;
      }

      const qrData = JSON.stringify({
        name, seat, section: program, day, time
      });

      // إعادة إنشاء الـ canvas قبل توليد كل QR جديد
      document.getElementById('qrcode').innerHTML = '<canvas id="qrCanvas"></canvas>';
      const qrCanvas = document.getElementById('qrCanvas');

      new QRious({
        element: qrCanvas,
        value: qrData,
        size: 250,
        background: 'white',
        foreground: '#2575fc'
      });
    }
  </script>
</div>
</body>
</html>
